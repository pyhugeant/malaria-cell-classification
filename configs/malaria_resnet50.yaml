project:
  name: malaria-cell-classification
  seed: 42
  output_dir: /content/gdrive/MyDrive/malaria_cell_classification/runs
  device: auto

data:
  root_dir: /content/malaria
  image_size: 224
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  num_workers: 8

model:
  name: resnet50
  pretrained: true
  num_classes: 2
  freeze_backbone: false

train:
  epochs: 20
  batch_size: 256
  learning_rate: 0.0001
  weight_decay: 0.0001
  early_stopping_patience: 5

loss:
  name: cross_entropy

metrics:
  primary: val_f1
  save_best: true
